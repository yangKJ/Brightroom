appId: app.muukii.brightroom.SwiftUIDemo
name: Metal Brush Sandbox
tags:
  - metal-brush-sandbox
---
- launchApp:
    clearState: false
    stopApp: true
- tapOn:
    text: "Cancel"
    optional: true
- tapOn:
    text: "Dismiss"
    optional: true
- tapOn:
    id: "BackButton"
    optional: true
- tapOn:
    id: "metal-brush-back"
    optional: true
- tapOn: "Metal Brush Sandbox"
- assertVisible: "Metal Brush Sandbox"
- assertVisible:
    id: "metal-brush-reset"
- assertVisible:
    id: "metal-brush-metrics"
- assertVisible:
    id: "metal-brush-interaction-mode"
- assertVisible:
    id: "metal-brush-smoothing"
- assertVisible:
    id: "metal-brush-exposure"
- assertVisible:
    id: "metal-brush-smoothing-strength"
- assertVisible:
    id: "metal-brush-blur-radius"
- tapOn:
    id: "metal-brush-reset"
- assertVisible: "Stamps 0"
- assertVisible: "Bezier"
- assertVisible: "Draw"
- assertVisible: "View"
- assertVisible: "Strength"
- assertVisible: "Blur"
- tapOn: "View"
- doubleTapOn:
    point: 50%, 32%
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Zoom 1.00x"
- swipe:
    start: 62%, 34%
    end: 40%, 34%
    duration: 400
- tapOn: "Draw"
- swipe:
    direction: RIGHT
    from:
      id: "metal-brush-exposure"
    duration: 800
- assertNotVisible: "0.00"
- swipe:
    start: 48%, 32%
    end: 52%, 47%
    duration: 500
- assertVisible: "Strokes [1-9].*"
- tapOn:
    id: "metal-brush-reset"
- assertVisible: "Stamps 0"
