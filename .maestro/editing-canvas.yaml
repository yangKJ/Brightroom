appId: app.muukii.brightroom.SwiftUIDemo
name: Editing Canvas
tags:
  - editing-canvas
---
- launchApp:
    clearState: true
- tapOn: "Metal Brush Sandbox NASA"
- assertVisible: "Metal Brush Sandbox"
- assertVisible:
    id: "metal-brush-reset"
- assertVisible: "Draw"
- assertVisible: "Blur"
- tapOn:
    id: "metal-brush-reset"
- assertVisible: "Strokes 0"
- swipe:
    start: 42%, 27%
    end: 62%, 34%
    duration: 500
- assertVisible: "Strokes [1-9].*"
- tapOn:
    id: "metal-brush-reset"
- assertVisible: "Strokes 0"

- launchApp:
    clearState: true
- swipe:
    start: 50%, 82%
    end: 50%, 24%
    duration: 500
- swipe:
    start: 50%, 82%
    end: 50%, 24%
    duration: 500
- tapOn: "PixelEditor"
- assertVisible: "Done"
- tapOn: "Edit"
- tapOn: "Mask"
- assertVisible: "Mask"
- assertVisible: "Clear"
- swipe:
    start: 28%, 42%
    end: 72%, 51%
    duration: 600
- assertVisible: "Done"
- tapOn: "Clear"
- assertVisible: "Done"
- tapOn: "Done"
- assertVisible: "Edit"
